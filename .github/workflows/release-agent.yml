name: Release Agent (All Platforms)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v15.1.2)'
        required: true
      compatibility_line:
        description: 'Server compatibility line (e.g. 15.1). Defaults to major.minor from the version tag.'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: "0.14.1"

jobs:
  linux:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      semver: ${{ steps.semver.outputs.version }}
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y curl git ca-certificates build-essential \
            dpkg-dev rpm gnupg pkg-config python3 xz-utils \
            libelf-dev zlib1g-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          case "${ZIG_VERSION}" in
            0.14.1)
              ZIG_URLS=(
                "https://mirrors.sdu.edu.cn/gentoo/distfiles/24/zig-x86_64-linux-0.14.1.tar.xz"
                "https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz"
              )
              ZIG_SHA256="24aeeec8af16c381934a6cd7d95c807a8cb2cf7df9fa40d359aa884195c4716c"
              ;;
            *)
              echo "Unsupported pinned ZIG_VERSION=${ZIG_VERSION}; add checksum before using it" >&2
              exit 1
              ;;
          esac
          rm -f /tmp/zig.tar.xz
          for zig_url in "${ZIG_URLS[@]}"; do
            echo "Downloading Zig from ${zig_url}"
            if timeout 90s curl --fail --location --retry 2 --retry-delay 3 --connect-timeout 15 --speed-time 20 --speed-limit 1024 "$zig_url" -o /tmp/zig.tar.xz; then
              break
            fi
            rm -f /tmp/zig.tar.xz
          done
          test -s /tmp/zig.tar.xz
          echo "${ZIG_SHA256}  /tmp/zig.tar.xz" | sha256sum -c -
          mkdir -p /opt/zig
          tar -xJf /tmp/zig.tar.xz --strip-components=1 -C /opt/zig
          ln -sf /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.45.0
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" | \
            tar -xz -C /usr/local/bin nfpm

      - name: Strip version prefix
        id: semver
        run: |
          RAW="${{ steps.version.outputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Run release optimization preflight
        run: bash scripts/run_release_profile_opt_ci.sh

      - name: Enforce release optimization preflight threshold
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          path = pathlib.Path('artifacts/release-profile-opt/metrics.json')
          if not path.exists():
              raise SystemExit('missing release profile optimization metrics artifact')

          metrics = json.loads(path.read_text())
          build_ms = int(metrics.get('baseline_release_build_ms', 10**9))
          # Cold GitHub-hosted Linux container runs have been observed around
          # ~183s even when local preflight stays comfortably below 90s. Keep
          # the guardrail tight enough to catch regressions, but high enough to
          # avoid flaking release builds on routine runner variance.
          max_build_ms = 210_000
          if build_ms > max_build_ms:
              print(f'release optimization preflight build too high: {build_ms} ms > {max_build_ms} ms')
              sys.exit(1)

          print(f'release optimization preflight threshold passed: {build_ms} ms <= {max_build_ms} ms')
          PY

      - name: Build .deb and .rpm packages
        env:
          EGUARD_PACKAGE_REAL_BUILD: "1"
          EGUARD_PACKAGE_GENERATE_EPHEMERAL_GPG: "1"
          VERSION: ${{ steps.semver.outputs.version }}
          EGUARD_AGENT_VERSION: ${{ steps.semver.outputs.version }}
        run: ./scripts/build-agent-packages-ci.sh

      - name: Enforce glibc floor (max GLIBC_2.31 for Ubuntu 20.04+ compat)
        run: |
          BINARY="artifacts/package-agent/eguard-agent"
          if [ ! -f "$BINARY" ]; then
            BINARY=$(find artifacts/package-agent -name 'agent-core' -o -name 'eguard-agent' | head -1)
          fi
          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "WARN: agent binary not found for glibc check, skipping"
            exit 0
          fi
          MAX_GLIBC="2.31"
          ACTUAL=$(objdump -T "$BINARY" 2>/dev/null | grep -oP 'GLIBC_\K[0-9.]+' | sort -V | tail -1)
          echo "Binary glibc floor: GLIBC_${ACTUAL} (max allowed: GLIBC_${MAX_GLIBC})"
          if [ -n "$ACTUAL" ]; then
            python3 -c "
          from packaging.version import Version
          actual, maximum = Version('${ACTUAL}'), Version('${MAX_GLIBC}')
          if actual > maximum:
              raise SystemExit(f'glibc floor {actual} exceeds max {maximum}')
          print(f'glibc floor check passed: {actual} <= {maximum}')
          " 2>/dev/null || python3 -c "
          a = tuple(int(x) for x in '${ACTUAL}'.split('.'))
          m = tuple(int(x) for x in '${MAX_GLIBC}'.split('.'))
          if a > m:
              raise SystemExit(f'glibc floor GLIBC_${ACTUAL} exceeds max GLIBC_${MAX_GLIBC}')
          print(f'glibc floor check passed: GLIBC_${ACTUAL} <= GLIBC_${MAX_GLIBC}')
          "
          fi

      - name: Validate package artifact structure
        run: python3 scripts/verify_package_artifacts_ci.py --artifact-dir artifacts/package-agent

      - name: Validate package install smoke in isolated container
        continue-on-error: true
        env:
          EGUARD_CONTAINER_REQUIRE_EBPF_LIBBPF: "0"
        run: bash scripts/run_package_container_install_smoke_ci.sh

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            artifacts/package-agent/debian/*.deb
            artifacts/package-agent/rpm/*.rpm

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Strip version prefix
        id: semver
        shell: bash
        run: |
          RAW="${{ steps.version.outputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\\.dotnet\\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Zig ASM artifacts
        shell: bash
        run: zig build asm-artifacts

      - name: Validate platform-windows target build
        shell: bash
        run: |
          cargo check --target x86_64-pc-windows-msvc -p platform-windows

      - name: Run platform-windows tests
        shell: bash
        run: |
          cargo test -p platform-windows

      - name: Build Windows agent binary
        shell: bash
        env:
          EGUARD_AGENT_VERSION: ${{ steps.semver.outputs.version }}
        run: cargo build --release --target x86_64-pc-windows-msvc -p agent-core

      - name: Build Windows MSI package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          wix build installer/windows/eguard-agent.wxs `
            -d AgentExePath=target/x86_64-pc-windows-msvc/release/agent-core.exe `
            -d AgentVersion=${{ steps.semver.outputs.version }} `
            -o artifacts/windows/eguard-agent-${{ steps.semver.outputs.version }}-x64.msi

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p artifacts/windows
          cp target/x86_64-pc-windows-msvc/release/agent-core.exe artifacts/windows/eguard-agent.exe
          cp installer/windows/install.ps1 artifacts/windows/install.ps1

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            artifacts/windows/eguard-agent.exe
            artifacts/windows/eguard-agent-*.msi
            artifacts/windows/install.ps1

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Strip version prefix
        id: semver
        run: |
          RAW="${{ steps.version.outputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        env:
          EGUARD_AGENT_VERSION: ${{ steps.semver.outputs.version }}
        run: cargo build --release --target aarch64-apple-darwin -p agent-core

      - name: Build x86_64
        env:
          EGUARD_AGENT_VERSION: ${{ steps.semver.outputs.version }}
        run: cargo build --release --target x86_64-apple-darwin -p agent-core

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output eguard-agent

      - name: Build .pkg
        run: ./installer/macos/build-pkg.sh
        env:
          VERSION: ${{ steps.semver.outputs.version }}
          DEVELOPER_ID_INSTALLER: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Verify pkg signature
        if: env.DEVELOPER_ID_INSTALLER != ''
        env:
          DEVELOPER_ID_INSTALLER: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER }}
        run: pkgutil --check-signature artifacts/macos/eguard-agent-*.pkg

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            artifacts/macos/eguard-agent-*.pkg
            artifacts/macos/eguard-agent-*.dmg

  release:
    needs: [linux, windows, macos]
    if: always() && needs.linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ needs.linux.outputs.semver }}'
          COMPAT='${{ github.event.inputs.compatibility_line }}'
          if [ -z "$COMPAT" ]; then
            COMPAT=$(python3 - <<'PY'
          import re
          v = "${{ needs.linux.outputs.semver }}"
          m = re.search(r'(\d+)\.(\d+)', v)
          print(f"{m.group(1)}.{m.group(2)}" if m else "")
          PY
          )
          fi
          if [ -z "$COMPAT" ]; then
            echo "Unable to derive compatibility line" >&2
            exit 1
          fi
          python3 - <<'PY'
          import glob
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ['VERSION']
          tag = '${{ needs.linux.outputs.tag }}'
          compat = os.environ['COMPAT']
          root = Path('release-artifacts')

          def one(pattern):
              matches = [
                  candidate for candidate in sorted(glob.glob(pattern, recursive=True))
                  if 'eguard-agent-rules' not in Path(candidate).name
              ]
              return matches[0] if matches else ''

          def sha256(path):
              if not path:
                  return ''
              h = hashlib.sha256()
              with open(path, 'rb') as fh:
                  for chunk in iter(lambda: fh.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          assets = {
              'deb': one('release-artifacts/linux-packages/**/*.deb'),
              'rpm': one('release-artifacts/linux-packages/**/*.rpm'),
              'exe': one('release-artifacts/windows-packages/**/*.exe'),
              'msi': one('release-artifacts/windows-packages/**/*.msi'),
              'pkg': one('release-artifacts/macos-packages/**/*.pkg'),
          }
          manifest_assets = {k: Path(v).name for k, v in assets.items() if v}
          checksums = {k: sha256(v) for k, v in assets.items() if v}
          manifest = {
              'schema_version': 1,
              'agent_version': version,
              'release_tag': tag,
              'compatibility': {'server_minors': [compat]},
              'assets': manifest_assets,
              'checksums': checksums,
          }
          out = root / 'eguard-agent-release.json'
          out.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(out)
          PY
        env:
          VERSION: ${{ needs.linux.outputs.semver }}
          COMPAT: ${{ github.event.inputs.compatibility_line }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.linux.outputs.tag }}
          name: "eGuard Agent ${{ needs.linux.outputs.tag }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/linux-packages/**/*.deb
            release-artifacts/linux-packages/**/*.rpm
            release-artifacts/windows-packages/**/*.exe
            release-artifacts/windows-packages/**/*.msi
            release-artifacts/windows-packages/**/*.ps1
            release-artifacts/macos-packages/**/*.pkg
            release-artifacts/macos-packages/**/*.dmg
            release-artifacts/eguard-agent-release.json
