syntax = "proto3";

package eguard.v1;

option go_package = "gitlab.com/devaistech77/fe_eguard/go/api/agent/v1;agentv1";

service CommandService {
  rpc CommandChannel(CommandPollRequest) returns (stream ServerCommand);
  rpc PollCommands(PollCommandsRequest) returns (PollCommandsResponse);
  rpc AckCommand(AckCommandRequest) returns (AckCommandResponse);
  rpc EnqueueCommand(EnqueueCommandRequest) returns (EnqueueCommandResponse);
}

enum CommandType {
  ISOLATE_HOST = 0;
  UNISOLATE_HOST = 1;
  RUN_SCAN = 2;
  UPDATE_RULES = 3;
  FORENSICS_COLLECT = 4;
  CONFIG_CHANGE = 5;
  RESTORE_QUARANTINE = 6;
  UNINSTALL = 7;
  EMERGENCY_RULE_PUSH = 8;
  LOCK_DEVICE = 9;
  WIPE_DEVICE = 10;
  RETIRE_DEVICE = 11;
  RESTART_DEVICE = 12;
  LOST_MODE = 13;
  LOCATE_DEVICE = 14;
  INSTALL_APP = 15;
  REMOVE_APP = 16;
  UPDATE_APP = 17;
  APPLY_PROFILE = 18;
  APPLY_WIFI_PROFILE = 19;
  APPLY_VPN_PROFILE = 20;
  PUSH_CERTIFICATE = 21;
  ZTNA_TUNNEL_REVOKE = 22;
  ZTNA_CONFIG_UPDATE = 23;
}

enum ProfileType {
  PROFILE_TYPE_UNSPECIFIED = 0;
  PROFILE_TYPE_WIFI = 1;
  PROFILE_TYPE_VPN = 2;
  PROFILE_TYPE_CERTIFICATE = 3;
  PROFILE_TYPE_APP_CONFIG = 4;
  PROFILE_TYPE_CUSTOM = 5;
}

message IsolateParams {
  bool allow_server_connection = 1;
  repeated string allow_server_ips = 2;
}

message ScanParams {
  repeated string paths = 1;
  bool yara_scan = 2;
  bool ioc_scan = 3;
}

message UpdateParams {
  string target_version = 1;
  string download_url = 2;
  string checksum = 3;
}

message ForensicsParams {
  bool memory_dump = 1;
  bool process_list = 2;
  bool network_connections = 3;
  bool open_files = 4;
  bool loaded_modules = 5;
  repeated int64 target_pids = 6;
}

message ConfigChangeParams {
  string config_json = 1;
  string config_version = 2;
}

message RestoreQuarantineParams {
  string sha256 = 1;
  string original_path = 2;
}

message UninstallParams {
  string auth_token = 1;
  bool wipe_data = 2;
}

message DeviceActionParams {
  bool force = 1;
  string reason = 2;
}

message LocateParams {
  bool high_accuracy = 1;
}

message AppParams {
  string package_name = 1;
  string version = 2;
  bool managed = 3;
  string package_url = 4;
  string checksum_sha256 = 5;
  string installer_type = 6;
  string install_args = 7;
  string uninstall_args = 8;
  string signature = 9;
}

message ProfileParams {
  string profile_id = 1;
  string profile_json = 2;
  ProfileType profile_type = 3;
}

message WifiProfileParams {
  string profile_id = 1;
  string ssid = 2;
  bool hidden = 3;
  string security_type = 4;
  string passphrase = 5;
  string identity = 6;
  string anonymous_identity = 7;
  string eap_method = 8;
  string ca_certificate_pem = 9;
  string client_certificate_pem = 10;
  string client_key_encrypted = 11;
  bool auto_join = 12;
  repeated string dns_servers = 13;
}

message VpnProfileParams {
  string profile_id = 1;
  string provider = 2;
  string server = 3;
  string username = 4;
  string password_encrypted = 5;
  string shared_secret_encrypted = 6;
  string ca_certificate_pem = 7;
  string client_certificate_pem = 8;
  string client_key_encrypted = 9;
  repeated string routes = 10;
  repeated string dns_servers = 11;
  bool always_on = 12;
}

message CertificateParams {
  string pem = 1;
  string key_encrypted = 2;
  repeated string ca_chain = 3;
  string alias = 4;
  string use_case = 5;
  int32 rotate_before_expiry_days = 6;
}

message CommandPollRequest {
  string agent_id = 1;
  repeated string completed_command_ids = 2;
}

message ServerCommand {
  string command_id = 1;
  CommandType command_type = 2;
  int64 issued_at = 3;
  string issued_by = 4;

  oneof params {
    IsolateParams isolate = 10;
    ScanParams scan = 11;
    UpdateParams update = 12;
    ForensicsParams forensics = 13;
    ConfigChangeParams config_change = 14;
    RestoreQuarantineParams restore_quarantine = 15;
    UninstallParams uninstall = 16;
    DeviceActionParams lock = 17;
    DeviceActionParams wipe = 18;
    DeviceActionParams retire = 19;
    DeviceActionParams restart = 20;
    DeviceActionParams lost_mode = 21;
    LocateParams locate = 22;
    AppParams install_app = 23;
    AppParams remove_app = 24;
    AppParams update_app = 25;
    ProfileParams apply_profile = 26;
    WifiProfileParams apply_wifi_profile = 27;
    VpnProfileParams apply_vpn_profile = 28;
    CertificateParams push_certificate = 29;
  }
}

// Legacy request retained for compatibility with existing code paths.
message CommandChannelRequest {
  string agent_id = 1;
  repeated string completed_command_ids = 2;
  int32 limit = 3;
}

message AgentCommand {
  string command_id = 1;
  string command_type = 2;
  string payload_json = 3;
  string status = 4;
  string issued_by = 5;
}

message PollCommandsRequest {
  string agent_id = 1;
  int32 limit = 2;
}

message PollCommandsResponse {
  repeated AgentCommand commands = 1;
}

message AckCommandRequest {
  string command_id = 1;
  string status = 2;
  string agent_id = 3;
  string result_json = 4;
}

message AckCommandResponse {
  string status = 1;
}

message EnqueueCommandRequest {
  string agent_id = 1;
  string command_id = 2;
  string command_type = 3;
  string payload_json = 4;
  string issued_by = 5;
}

message EnqueueCommandResponse {
  string status = 1;
}
