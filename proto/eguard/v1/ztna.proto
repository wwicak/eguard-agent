syntax = "proto3";

package eguard.v1;

option go_package = "gitlab.com/devaistech77/fe_eguard/go/api/agent/v1;agentv1";

service ZtnaService {
  rpc RequestTunnel(TunnelRequest) returns (TunnelDecision);
  rpc ReleaseTunnel(TunnelRelease) returns (TunnelReleaseAck);
  rpc ListBookmarks(BookmarkRequest) returns (BookmarkList);
  rpc SessionHeartbeat(SessionHeartbeatRequest) returns (SessionHeartbeatAck);
  rpc ReportTunnelStatus(TunnelStatusReport) returns (TunnelStatusAck);
  rpc CheckoutCredential(CheckoutRequest) returns (CheckoutResponse);
  rpc CheckinCredential(CheckinRequest) returns (CheckinResponse);
  rpc GetApprovalStatus(ApprovalStatusRequest) returns (ApprovalStatusResponse);
}

enum PreferredTransport {
  PREFERRED_TRANSPORT_UNSPECIFIED = 0;
  PREFERRED_TRANSPORT_WIREGUARD = 1;
  PREFERRED_TRANSPORT_TLS_FALLBACK = 2;
}

enum TunnelTransport {
  TUNNEL_TRANSPORT_UNSPECIFIED = 0;
  TUNNEL_TRANSPORT_WIREGUARD = 1;
  TUNNEL_TRANSPORT_TLS_FALLBACK = 2;
}

enum TunnelReleaseReason {
  TUNNEL_RELEASE_REASON_UNSPECIFIED = 0;
  TUNNEL_RELEASE_REASON_USER_DISCONNECT = 1;
  TUNNEL_RELEASE_REASON_IDLE_TIMEOUT = 2;
  TUNNEL_RELEASE_REASON_POSTURE_FAIL = 3;
  TUNNEL_RELEASE_REASON_ADMIN_REVOKE = 4;
  TUNNEL_RELEASE_REASON_POLICY_CHANGE = 5;
}

enum TunnelHealthStatus {
  TUNNEL_HEALTH_STATUS_UNKNOWN = 0;
  TUNNEL_HEALTH_STATUS_UP = 1;
  TUNNEL_HEALTH_STATUS_DEGRADED = 2;
  TUNNEL_HEALTH_STATUS_DOWN = 3;
}

message ClientCapabilities {
  bool wireguard_supported = 1;
  bool tls_fallback_supported = 2;
  bool split_dns_supported = 3;
  bool launcher_supported = 4;
  bool socks5_supported = 5;
}

message TunnelRequest {
  string agent_id = 1;
  string app_id = 2;
  string agent_wg_public_key = 3;
  PreferredTransport preferred_transport = 4;
  ClientCapabilities client_capabilities = 5;
}

message DnsConfig {
  repeated string search_domains = 1;
  repeated string resolver_addresses = 2;
  repeated string split_dns_domains = 3;
}

message SshParams {
  string username = 1;
  int32 port = 2;
  string identity_key_pem = 3;
}

message RdpParams {
  string username = 1;
  string domain = 2;
  int32 width = 3;
  int32 height = 4;
  int32 color_depth = 5;
}

message VncParams {
  string password_encrypted = 1;
  int32 width = 2;
  int32 height = 3;
}

message WebParams {
  string url_path = 1;
  bool inject_auth_header = 2;
}

message TcpParams {
  string display_name = 1;
}

message AppLaunchParams {
  oneof params {
    SshParams ssh = 1;
    RdpParams rdp = 2;
    VncParams vnc = 3;
    WebParams web = 4;
    TcpParams tcp = 5;
  }
}

message TunnelGrant {
  string session_id = 1;
  string session_token = 2;
  string server_wg_public_key = 3;
  string server_endpoint = 4;
  string tunnel_ip = 5;
  repeated string allowed_ips = 6;
  string preshared_key = 7;
  DnsConfig dns_config = 8;
  int32 ttl_seconds = 9;
  AppLaunchParams app_params = 10;
  TunnelTransport transport = 11;
  string bookmark_version = 12;
}

message TunnelDeny {
  string reason = 1;
  string remediation_hint = 2;
  int32 retry_after_seconds = 3;
}

message TunnelDecision {
  oneof result {
    TunnelGrant grant = 1;
    TunnelDeny deny = 2;
  }
}

message TunnelRelease {
  string session_id = 1;
  TunnelReleaseReason reason = 2;
  string detail = 3;
}

message TunnelReleaseAck {
  bool success = 1;
}

message SessionHeartbeatRequest {
  string session_id = 1;
  int64 bytes_tx = 2;
  int64 bytes_rx = 3;
  int32 active_connections = 4;
  int32 tunnel_latency_ms = 5;
}

message SessionHeartbeatAck {
  bool accepted = 1;
}

message TunnelStatusReport {
  string session_id = 1;
  TunnelHealthStatus status = 2;
  string message = 3;
  TunnelTransport transport = 4;
}

message TunnelStatusAck {
  bool accepted = 1;
}

message BookmarkRequest {
  string agent_id = 1;
  string last_bookmark_version = 2;
}

message ApplicationBookmark {
  string app_id = 1;
  string name = 2;
  string icon = 3;
  string app_type = 4;
  string description = 5;
  string health_status = 6;
  string launch_uri = 7;
  bool launcher_supported = 8;
  string target_host = 9;
  uint32 target_port = 10;
  string display_hint = 11;
  string user_hint = 12;
}

message BookmarkList {
  string version = 1;
  repeated ApplicationBookmark bookmarks = 2;
  int64 generated_at_unix = 3;
}

message PasswordCredential {
  string username = 1;
  string password = 2;
  string domain = 3;
}

message SshKeyCredential {
  string username = 1;
  string private_key_pem = 2;
  string passphrase = 3;
}

message RecordingPolicy {
  string mode = 1;
  int32 screenshot_interval_seconds = 2;
}

message CheckoutRequest {
  string agent_id = 1;
  string app_id = 2;
  int64 credential_id = 3;
  string reason = 4;
  int32 requested_duration_min = 5;
}

message CheckoutResponse {
  string checkout_id = 1;
  string status = 2;
  oneof credential {
    PasswordCredential password = 3;
    SshKeyCredential ssh_key = 4;
  }
  int64 expires_at_unix = 5;
  RecordingPolicy recording_policy = 6;
  string denial_reason = 7;
}

message SessionSummary {
  int64 duration_seconds = 1;
  int32 commands_count = 2;
  int64 bytes_transferred = 3;
}

message CheckinRequest {
  string checkout_id = 1;
  SessionSummary session_summary = 2;
}

message CheckinResponse {
  bool accepted = 1;
}

message ApprovalStatusRequest {
  string checkout_id = 1;
}

message ApprovalStatusResponse {
  string checkout_id = 1;
  string status = 2;
  string decision_reason = 3;
  int64 expires_at_unix = 4;
}
