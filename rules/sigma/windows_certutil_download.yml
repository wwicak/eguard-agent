title: windows_certutil_download
id: windows_certutil_download
status: experimental
tags:
  - attack.t1105
  - attack.t1218
mitre_techniques:
  - T1105
  - T1218

detection:
  sequence:
    - event_class: process_exec
      process_any_of:
        - certutil.exe
        - cmd.exe
        - powershell.exe
        - pwsh.exe
      command_line_contains:
        - "certutil.exe -urlcache"
        - "certutil -urlcache"
      within_secs: 30
