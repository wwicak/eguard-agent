title: windows_certutil_encode
id: windows_certutil_encode
status: experimental
logsource:
  product: windows
  category: process_creation
tags:
  - attack.t1027
  - attack.t1218
mitre_techniques:
  - T1027
  - T1218

detection:
  sequence:
    - event_class: process_exec
      process_any_of:
        - certutil.exe
        - cmd.exe
        - powershell.exe
        - pwsh.exe
      command_line_contains:
        - "certutil.exe -encode"
        - "certutil -encode"
      within_secs: 30
