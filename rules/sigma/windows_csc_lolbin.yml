title: windows_csc_lolbin
id: windows_csc_lolbin
status: experimental
logsource:
  product: windows
  category: process_creation
tags:
  - attack.t1127
mitre_techniques:
  - T1127

detection:
  sequence:
    - event_class: process_exec
      process_any_of:
        - csc.exe
        - cmd.exe
        - powershell.exe
        - pwsh.exe
      command_line_contains:
        - "csc.exe /out:"
        - "csc.exe /out"
      within_secs: 30
