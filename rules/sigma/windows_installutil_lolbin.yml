title: windows_installutil_lolbin
id: windows_installutil_lolbin
status: experimental
logsource:
  product: windows
  category: process_creation
tags:
  - attack.t1218
mitre_techniques:
  - T1218

detection:
  sequence:
    - event_class: process_exec
      process_any_of:
        - installutil.exe
        - cmd.exe
        - powershell.exe
        - pwsh.exe
      command_line_contains:
        - "installutil.exe"
      within_secs: 30
