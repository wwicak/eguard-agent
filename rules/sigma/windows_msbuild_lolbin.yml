title: windows_msbuild_lolbin
id: windows_msbuild_lolbin
status: experimental
logsource:
  product: windows
  category: process_creation
tags:
  - attack.t1127
mitre_techniques:
  - T1127

detection:
  sequence:
    - event_class: process_exec
      process_any_of:
        - msbuild.exe
        - cmd.exe
        - powershell.exe
        - pwsh.exe
      command_line_contains:
        - "msbuild.exe"
      within_secs: 30
